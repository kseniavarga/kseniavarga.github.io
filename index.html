<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ksenia Varga | Photonics Researcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    
    .hero {
      height: 100vh;
      background-image: url('hero-background.png');
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .hero::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.38); z-index: 1; }
    
    .hero-content { position: relative; z-index: 2; text-align: center; padding: 0 20px; }
    .hero h1 { font-size: clamp(2.8rem, 8vw, 5rem); margin-bottom: 12px; }
    .hero p { font-size: clamp(1.15rem, 3vw, 1.6rem); margin-bottom: 40px; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 40px;
      background: linear-gradient(90deg, #00f0ff, #ff00aa);
      color: white;
      font-size: 1.25rem;
      font-weight: 700;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4);
      transition: all 0.3s ease;
    }
    .btn:hover { transform: translateY(-4px) scale(1.05); }
    .alien { width: 42px; height: 42px; border-radius: 50%; }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-content">
      <h1>Ksenia Varga</h1>
      <p>Photonics Researcher and Materials Chemist</p>
      <a href="about.html" class="btn">
        <img src="alien.png" alt="Green alien" class="alien">
        DON'T PANIC!
      </a>
    </div>
  </section>

</body>
</html>
